<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Sample placeholder hero</title>
  <desc id="desc">Decorative placeholder image for the sample GitHub Pages site.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c2336"/>
      <stop offset="100%" stop-color="#09131d"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#47c0ff"/>
      <stop offset="100%" stop-color="#78f0b2"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#47c0ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#47c0ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="720" rx="36" fill="url(#bg)"/>
  <rect x="30" y="30" width="1140" height="660" rx="28" fill="none" stroke="#78b5ff" stroke-opacity="0.2"/>
  <circle cx="610" cy="250" r="300" fill="url(#glow)"/>
  <g stroke="#ffffff" stroke-opacity="0.08">
    <path d="M0 120H1200"/>
    <path d="M0 240H1200"/>
    <path d="M0 360H1200"/>
    <path d="M0 480H1200"/>
    <path d="M0 600H1200"/>
    <path d="M150 0V720"/>
    <path d="M300 0V720"/>
    <path d="M450 0V720"/>
    <path d="M600 0V720"/>
    <path d="M750 0V720"/>
    <path d="M900 0V720"/>
    <path d="M1050 0V720"/>
  </g>
  <g transform="translate(120 130)">
    <text x="0" y="0" fill="#78f0b2" font-family="Segoe UI, sans-serif" font-size="28" letter-spacing="6">SAMPLE VISUAL</text>
    <text x="0" y="110" fill="#eef6ff" font-family="Segoe UI, sans-serif" font-size="88" font-weight="700">Static Assets</text>
    <text x="0" y="200" fill="#9fb7cf" font-family="Segoe UI, sans-serif" font-size="34">Put images, CSS, and scripts under docs/assets/</text>
    <rect x="0" y="270" width="430" height="12" rx="6" fill="url(#line)"/>
    <rect x="0" y="330" width="580" height="110" rx="24" fill="#10263d" fill-opacity="0.88" stroke="#78b5ff" stroke-opacity="0.2"/>
    <text x="36" y="398" fill="#d5edff" font-family="Consolas, monospace" font-size="30">./assets/placeholder-hero.svg</text>
  </g>
</svg>
